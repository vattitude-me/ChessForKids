<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" width="1400" height="700">
  <defs>
    <linearGradient id="night-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="30%" stop-color="#2d1b69"/>
      <stop offset="60%" stop-color="#44237a"/>
      <stop offset="80%" stop-color="#5c2d91"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="castle-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff8c00"/>
      <stop offset="50%" stop-color="#ff6b0080"/>
      <stop offset="100%" stop-color="#ff450000"/>
    </linearGradient>
    <linearGradient id="board-light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0e4cc"/>
      <stop offset="100%" stop-color="#d4c4a0"/>
    </linearGradient>
    <linearGradient id="board-dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a4a5a"/>
      <stop offset="100%" stop-color="#2a2a3a"/>
    </linearGradient>
    <linearGradient id="magic-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#6c3483"/>
    </linearGradient>
    <linearGradient id="gold-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffed4a"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
    <radialGradient id="magic-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fire-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8c00" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#ff6b00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff4500" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-filter">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000060"/>
    </filter>
  </defs>

  <!-- Night sky -->
  <rect width="1400" height="700" fill="url(#night-sky)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.7">
    <circle cx="80" cy="50" r="1.5"/>
    <circle cx="200" cy="30" r="1"/>
    <circle cx="350" cy="70" r="1.8"/>
    <circle cx="500" cy="25" r="1.2"/>
    <circle cx="650" cy="55" r="1.5"/>
    <circle cx="800" cy="35" r="1"/>
    <circle cx="950" cy="60" r="1.8"/>
    <circle cx="1100" cy="20" r="1.3"/>
    <circle cx="1250" cy="45" r="1.5"/>
    <circle cx="1350" cy="75" r="1"/>
    <circle cx="150" cy="120" r="1"/>
    <circle cx="420" cy="110" r="1.3"/>
    <circle cx="750" cy="95" r="1"/>
    <circle cx="1050" cy="85" r="1.5"/>
    <circle cx="1300" cy="110" r="1"/>
    <circle cx="100" cy="180" r="0.8"/>
    <circle cx="300" cy="160" r="1.2"/>
    <circle cx="1200" cy="140" r="1"/>
  </g>

  <!-- Castle silhouette background -->
  <g opacity="0.85">
    <!-- Castle glow behind -->
    <ellipse cx="700" cy="250" rx="200" ry="150" fill="url(#fire-glow)" opacity="0.5"/>
    <!-- Main castle body -->
    <rect x="600" y="180" width="200" height="200" fill="#1a0a2e"/>
    <!-- Left tower -->
    <rect x="560" y="140" width="50" height="240" fill="#1a0a2e"/>
    <polygon points="560,140 585,100 610,140" fill="#1a0a2e"/>
    <!-- Right tower -->
    <rect x="790" y="140" width="50" height="240" fill="#1a0a2e"/>
    <polygon points="790,140 815,100 840,140" fill="#1a0a2e"/>
    <!-- Center spire -->
    <rect x="685" y="120" width="30" height="100" fill="#1a0a2e"/>
    <polygon points="685,120 700,70 715,120" fill="#1a0a2e"/>
    <!-- Windows glowing -->
    <rect x="620" y="220" width="20" height="30" rx="10" fill="#ff8c00" opacity="0.7"/>
    <rect x="660" y="220" width="20" height="30" rx="10" fill="#ff8c00" opacity="0.6"/>
    <rect x="720" y="220" width="20" height="30" rx="10" fill="#ff8c00" opacity="0.7"/>
    <rect x="760" y="220" width="20" height="30" rx="10" fill="#ff8c00" opacity="0.6"/>
    <!-- Gate -->
    <path d="M670 380 L670 310 Q700 280 730 310 L730 380 Z" fill="#0d0520"/>
  </g>

  <!-- Lightning bolt -->
  <g filter="url(#glow-filter)" opacity="0.9">
    <polyline points="720,80 710,130 725,130 705,180" fill="none" stroke="#ffd700" stroke-width="3" stroke-linecap="round"/>
    <polyline points="720,80 710,130 725,130 705,180" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Dragon silhouette (left side) -->
  <g transform="translate(180, 130)" opacity="0.7">
    <!-- Body -->
    <path d="M0 80 Q20 60 50 55 Q80 50 100 60 Q120 70 110 90 Q100 110 70 105 Q40 100 20 95 Z" fill="#3d2066"/>
    <!-- Wing -->
    <path d="M60 55 Q40 20 20 30 Q30 10 55 5 Q80 0 90 20 Q95 40 80 50 Z" fill="#2d1559"/>
    <!-- Head -->
    <path d="M100 60 Q120 50 130 55 Q140 60 135 70 Q130 80 115 75 Q105 70 100 65 Z" fill="#3d2066"/>
    <!-- Eye -->
    <circle cx="122" cy="62" r="3" fill="#ffd700"/>
    <!-- Tail -->
    <path d="M0 80 Q-20 90 -30 85 Q-40 80 -35 70" fill="none" stroke="#3d2066" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Floating purple crystals -->
  <g filter="url(#glow-filter)">
    <polygon points="1150,180 1160,200 1150,220 1140,200" fill="#a855f7" opacity="0.8"/>
    <polygon points="1150,180 1160,200 1150,220 1140,200" fill="white" opacity="0.3"/>
  </g>
  <g filter="url(#glow-filter)">
    <polygon points="1200,250 1207,265 1200,280 1193,265" fill="#c084fc" opacity="0.6"/>
  </g>

  <!-- Ground/landscape -->
  <path d="M0 420 Q200 400 400 410 Q600 420 800 405 Q1000 390 1200 400 L1400 410 L1400 700 L0 700 Z" fill="#1a1a2e"/>

  <!-- Vines/foliage left -->
  <g opacity="0.6">
    <path d="M0 350 Q20 340 30 360 Q40 380 20 390 Q0 400 0 380 Z" fill="#1a5c1a"/>
    <path d="M30 380 Q50 370 55 390 Q60 410 40 415 Q25 420 30 400 Z" fill="#1a6b1a"/>
    <path d="M0 400 Q15 395 25 410 Q30 430 10 435 Q0 440 0 420 Z" fill="#145214"/>
  </g>

  <!-- Vines/foliage right -->
  <g opacity="0.6">
    <path d="M1400 340 Q1380 330 1370 350 Q1360 370 1380 380 Q1400 390 1400 370 Z" fill="#1a5c1a"/>
    <path d="M1370 370 Q1350 360 1345 380 Q1340 400 1360 405 Q1375 410 1370 390 Z" fill="#1a6b1a"/>
    <path d="M1400 390 Q1385 385 1375 400 Q1370 420 1390 425 Q1400 430 1400 410 Z" fill="#145214"/>
  </g>

  <!-- Chessboard (perspective) -->
  <g transform="translate(300, 400)">
    <!-- Board surface - slight perspective with skew -->
    <g transform="skewX(-2)">
      <!-- Board frame -->
      <rect x="-10" y="-10" width="820" height="290" rx="6" fill="#2a1a0a"/>
      <!-- Board -->
      <g>
        <!-- Row 1 -->
        <rect x="0" y="0" width="100" height="68" fill="#f0e4cc"/>
        <rect x="100" y="0" width="100" height="68" fill="#4a4a5a"/>
        <rect x="200" y="0" width="100" height="68" fill="#f0e4cc"/>
        <rect x="300" y="0" width="100" height="68" fill="#4a4a5a"/>
        <rect x="400" y="0" width="100" height="68" fill="#f0e4cc"/>
        <rect x="500" y="0" width="100" height="68" fill="#4a4a5a"/>
        <rect x="600" y="0" width="100" height="68" fill="#f0e4cc"/>
        <rect x="700" y="0" width="100" height="68" fill="#4a4a5a"/>
        <!-- Row 2 -->
        <rect x="0" y="68" width="100" height="68" fill="#4a4a5a"/>
        <rect x="100" y="68" width="100" height="68" fill="#f0e4cc"/>
        <rect x="200" y="68" width="100" height="68" fill="#4a4a5a"/>
        <rect x="300" y="68" width="100" height="68" fill="#f0e4cc"/>
        <rect x="400" y="68" width="100" height="68" fill="#4a4a5a"/>
        <rect x="500" y="68" width="100" height="68" fill="#f0e4cc"/>
        <rect x="600" y="68" width="100" height="68" fill="#4a4a5a"/>
        <rect x="700" y="68" width="100" height="68" fill="#f0e4cc"/>
        <!-- Row 3 -->
        <rect x="0" y="136" width="100" height="68" fill="#f0e4cc"/>
        <rect x="100" y="136" width="100" height="68" fill="#4a4a5a"/>
        <rect x="200" y="136" width="100" height="68" fill="#f0e4cc"/>
        <rect x="300" y="136" width="100" height="68" fill="#4a4a5a"/>
        <rect x="400" y="136" width="100" height="68" fill="#f0e4cc"/>
        <rect x="500" y="136" width="100" height="68" fill="#4a4a5a"/>
        <rect x="600" y="136" width="100" height="68" fill="#f0e4cc"/>
        <rect x="700" y="136" width="100" height="68" fill="#4a4a5a"/>
        <!-- Row 4 -->
        <rect x="0" y="204" width="100" height="68" fill="#4a4a5a"/>
        <rect x="100" y="204" width="100" height="68" fill="#f0e4cc"/>
        <rect x="200" y="204" width="100" height="68" fill="#4a4a5a"/>
        <rect x="300" y="204" width="100" height="68" fill="#f0e4cc"/>
        <rect x="400" y="204" width="100" height="68" fill="#4a4a5a"/>
        <rect x="500" y="204" width="100" height="68" fill="#f0e4cc"/>
        <rect x="600" y="204" width="100" height="68" fill="#4a4a5a"/>
        <rect x="700" y="204" width="100" height="68" fill="#f0e4cc"/>
      </g>
    </g>
  </g>

  <!-- Chess pieces on board -->
  <!-- White King -->
  <g transform="translate(600, 420)" filter="url(#shadow)">
    <ellipse cx="0" cy="50" rx="22" ry="8" fill="#d4c4a0" opacity="0.5"/>
    <path d="M-18 50 L-18 10 Q-18 -5 -10 -10 L10 -10 Q18 -5 18 10 L18 50 Z" fill="#f8f0e0" stroke="#d4b880" stroke-width="1.5"/>
    <rect x="-3" y="-30" width="6" height="20" rx="3" fill="url(#gold-shine)"/>
    <rect x="-9" y="-24" width="18" height="5" rx="2.5" fill="url(#gold-shine)"/>
    <ellipse cx="0" cy="50" rx="20" ry="6" fill="#f8f0e0" stroke="#d4b880" stroke-width="1"/>
  </g>

  <!-- White Queen -->
  <g transform="translate(500, 430)" filter="url(#shadow)">
    <ellipse cx="0" cy="45" rx="20" ry="7" fill="#d4c4a0" opacity="0.5"/>
    <path d="M-16 45 L-16 10 Q-16 0 -8 -5 L8 -5 Q16 0 16 10 L16 45 Z" fill="#f8f0e0" stroke="#d4b880" stroke-width="1.5"/>
    <polygon points="-12,-10 -8,-25 -4,-10" fill="url(#gold-shine)"/>
    <polygon points="-3,-10 0,-30 3,-10" fill="url(#gold-shine)"/>
    <polygon points="4,-10 8,-25 12,-10" fill="url(#gold-shine)"/>
    <circle cx="-8" cy="-25" r="3" fill="#ffd700"/>
    <circle cx="0" cy="-30" r="3.5" fill="#ffd700"/>
    <circle cx="8" cy="-25" r="3" fill="#ffd700"/>
  </g>

  <!-- White Knight -->
  <g transform="translate(700, 425)" filter="url(#shadow)">
    <ellipse cx="0" cy="48" rx="20" ry="7" fill="#d4c4a0" opacity="0.5"/>
    <path d="M-14 48 L-14 20 Q-14 5 -5 -5 Q5 -15 15 -10 L18 -5 Q22 2 18 10 L14 20 L14 48 Z" fill="#f8f0e0" stroke="#d4b880" stroke-width="1.5"/>
    <path d="M-8 -2 Q-3 -8 3 -6 Q8 -10 12 -6" fill="none" stroke="#d4b880" stroke-width="2" stroke-linecap="round"/>
    <circle cx="8" cy="0" r="2.5" fill="#333"/>
  </g>

  <!-- White Bishop -->
  <g transform="translate(400, 440)" filter="url(#shadow)">
    <ellipse cx="0" cy="42" rx="16" ry="6" fill="#d4c4a0" opacity="0.5"/>
    <path d="M-12 42 L-12 15 Q-12 5 0 -15 Q12 5 12 15 L12 42 Z" fill="#f8f0e0" stroke="#d4b880" stroke-width="1.5"/>
    <circle cx="0" cy="-15" r="4" fill="url(#gold-shine)"/>
    <line x1="0" y1="-5" x2="0" y2="20" stroke="#d4b880" stroke-width="1.5"/>
  </g>

  <!-- White Pawns -->
  <g transform="translate(450, 490)" filter="url(#shadow)">
    <ellipse cx="0" cy="30" rx="14" ry="5" fill="#d4c4a0" opacity="0.4"/>
    <path d="M-10 30 L-10 12 Q-10 5 0 5 Q10 5 10 12 L10 30 Z" fill="#f8f0e0" stroke="#d4b880" stroke-width="1"/>
    <circle cx="0" cy="0" r="8" fill="#f8f0e0" stroke="#d4b880" stroke-width="1"/>
  </g>
  <g transform="translate(550, 490)" filter="url(#shadow)">
    <ellipse cx="0" cy="30" rx="14" ry="5" fill="#d4c4a0" opacity="0.4"/>
    <path d="M-10 30 L-10 12 Q-10 5 0 5 Q10 5 10 12 L10 30 Z" fill="#f8f0e0" stroke="#d4b880" stroke-width="1"/>
    <circle cx="0" cy="0" r="8" fill="#f8f0e0" stroke="#d4b880" stroke-width="1"/>
  </g>
  <g transform="translate(650, 490)" filter="url(#shadow)">
    <ellipse cx="0" cy="30" rx="14" ry="5" fill="#d4c4a0" opacity="0.4"/>
    <path d="M-10 30 L-10 12 Q-10 5 0 5 Q10 5 10 12 L10 30 Z" fill="#f8f0e0" stroke="#d4b880" stroke-width="1"/>
    <circle cx="0" cy="0" r="8" fill="#f8f0e0" stroke="#d4b880" stroke-width="1"/>
  </g>

  <!-- Black pieces -->
  <!-- Black King -->
  <g transform="translate(750, 440)" filter="url(#shadow)">
    <ellipse cx="0" cy="45" rx="20" ry="7" fill="#111" opacity="0.5"/>
    <path d="M-16 45 L-16 8 Q-16 -5 -8 -8 L8 -8 Q16 -5 16 8 L16 45 Z" fill="#2a2a3a" stroke="#444" stroke-width="1.5"/>
    <rect x="-3" y="-28" width="6" height="20" rx="3" fill="#666"/>
    <rect x="-9" y="-22" width="18" height="5" rx="2.5" fill="#666"/>
  </g>

  <!-- Black Rook -->
  <g transform="translate(850, 445)" filter="url(#shadow)">
    <ellipse cx="0" cy="40" rx="18" ry="6" fill="#111" opacity="0.5"/>
    <path d="M-14 40 L-14 5 L14 5 L14 40 Z" fill="#2a2a3a" stroke="#444" stroke-width="1.5"/>
    <rect x="-14" y="-8" width="7" height="13" fill="#2a2a3a" stroke="#444" stroke-width="1"/>
    <rect x="-4" y="-8" width="8" height="13" fill="#2a2a3a" stroke="#444" stroke-width="1"/>
    <rect x="7" y="-8" width="7" height="13" fill="#2a2a3a" stroke="#444" stroke-width="1"/>
  </g>

  <!-- Magic glow on board center -->
  <circle cx="600" cy="480" r="80" fill="url(#magic-glow)" opacity="0.4"/>

  <!-- Sparkle particles -->
  <g filter="url(#glow-filter)">
    <!-- Around the board -->
    <circle cx="550" cy="400" r="2" fill="#a855f7" opacity="0.8"/>
    <circle cx="680" cy="420" r="1.5" fill="#c084fc" opacity="0.7"/>
    <circle cx="450" cy="450" r="2" fill="#ffd700" opacity="0.6"/>
    <circle cx="780" cy="460" r="1.8" fill="#a855f7" opacity="0.7"/>
    <circle cx="520" cy="380" r="1.5" fill="#ffd700" opacity="0.8"/>
    <circle cx="850" cy="400" r="2" fill="#c084fc" opacity="0.6"/>
    <!-- Floating up -->
    <circle cx="600" cy="350" r="2.5" fill="#ffd700" opacity="0.9"/>
    <circle cx="650" cy="330" r="2" fill="#a855f7" opacity="0.7"/>
    <circle cx="550" cy="340" r="1.8" fill="#c084fc" opacity="0.8"/>
  </g>

  <!-- Signpost (right side) -->
  <g transform="translate(1200, 280)">
    <!-- Post -->
    <rect x="-5" y="0" width="10" height="200" fill="#5c3a1a"/>
    <!-- Signs -->
    <g transform="translate(0, 20)">
      <rect x="-80" y="-15" width="100" height="30" rx="4" fill="#6b4226" stroke="#8b5a2b" stroke-width="1.5"/>
      <text x="-30" y="5" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#f0e4cc">Learn</text>
    </g>
    <g transform="translate(0, 65)">
      <rect x="-90" y="-15" width="110" height="30" rx="4" fill="#6b4226" stroke="#8b5a2b" stroke-width="1.5"/>
      <text x="-35" y="5" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#f0e4cc">Practice</text>
    </g>
    <g transform="translate(0, 110)">
      <rect x="-80" y="-15" width="100" height="30" rx="4" fill="#6b4226" stroke="#8b5a2b" stroke-width="1.5"/>
      <text x="-30" y="5" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#f0e4cc">Battle</text>
    </g>
    <g transform="translate(0, 155)">
      <rect x="-110" y="-15" width="140" height="30" rx="4" fill="#6b4226" stroke="#8b5a2b" stroke-width="1.5"/>
      <text x="-40" y="5" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#ffd700">Become a Legend!</text>
    </g>
    <!-- Vine on post -->
    <path d="M5 50 Q15 60 5 80 Q-5 100 5 120 Q15 140 5 160" fill="none" stroke="#2d7a2d" stroke-width="2.5" opacity="0.7"/>
    <circle cx="12" cy="70" r="4" fill="#3a8a3a" opacity="0.6"/>
    <circle cx="-2" cy="110" r="3.5" fill="#3a8a3a" opacity="0.6"/>
    <circle cx="12" cy="145" r="4" fill="#3a8a3a" opacity="0.6"/>
  </g>

  <!-- Bottom fade to dark -->
  <rect x="0" y="600" width="1400" height="100" fill="#1a1a2e"/>
</svg>
